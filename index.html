      '<div><div class="page-title">Player database</div>' +
      '<div class="page-sub">All players across all seasons (' + allPlayers.length + ' total)</div></div>' +
      '<button class="btn btn-primary" onclick="openAddGlobalPlayer()">+ New player</button>' +
    '</div>' +
    (allPlayers.length === 0
      ? '<div class="card"><div class="empty-state"><div class="empty-title">No players yet</div><div class="empty-sub">Players are added here when you create them in any season.</div></div></div>'
      : '<div class="card"><div class="tbl-wrap"><table>' +
          '<thead><tr><th>#</th><th>Name</th><th>Rating</th><th style="min-width:100px">Level</th><th>Seasons</th><th>History</th><th></th></tr></thead>' +
          '<tbody>' + allPlayers.map((p, i) => {
            const playerSeasons = S.seasons.filter(s => (s.players || []).includes(p.id));
            const hist = p.ratingHistory || [];
            const lastChange = hist.length > 0 ? hist[hist.length - 1].change : null;
            const trend = lastChange === null ? '' :
              lastChange > 0 ? '<span style="color:var(--success);font-size:12px;font-weight:600">&#9650; +' + lastChange + '</span>' :
              lastChange < 0 ? '<span style="color:var(--red);font-size:12px;font-weight:600">&#9660; ' + lastChange + '</span>' :
              '<span style="color:var(--muted);font-size:12px">&#8212;</span>';
            return '<tr>' +
              '<td style="color:var(--muted);font-size:11px">' + (i + 1) + '</td>' +
              '<td><span style="font-weight:500;cursor:pointer;color:var(--navy);text-decoration:underline" onclick="openGlobalPlayerDetail(\'' + p.id + '\')">' + p.name + '</span></td>' +
              '<td><span class="badge b-orange">' + p.rating + '</span></td>' +
              '<td><div class="rbar"><div class="rbar-fill" style="width:' + Math.round((p.rating / 31) * 100) + '%"></div></div></td>' +
              '<td style="font-size:12px;color:var(--muted)">' + (playerSeasons.length > 0 ? playerSeasons.map(s => s.name).join(', ') : 'None') + '</td>' +
              '<td>' + trend + '</td>' +
              '<td><div class="row-actions">' +
                '<button class="btn btn-sm btn-secondary" onclick="openGlobalPlayerDetail(\'' + p.id + '\')">View</button>' +
                '<button class="btn btn-sm btn-secondary" onclick="openGlobalEditRating(\'' + p.id + '\')">Edit rating</button>' +
                '<button class="btn btn-sm btn-danger" onclick="deleteGlobalPlayer(\'' + p.id + '\')">Delete</button>' +
              '</div></td>' +
            '</tr>';
          }).join('') +
          '</tbody></table></div></div>');
}

function openAddGlobalPlayer() {
  showModal('<div class="modal-title">New player</div>' +
    '<div style="font-size:13px;color:var(--muted);margin-bottom:14px">Adds to the global database. You can then add them to any season.</div>' +
    '<div class="form-row"><div><label>Full name</label><input id="gpl-name" placeholder="Player name"/></div></div>' +
    '<div class="form-row"><div><label>Rating (0 - 31)</label><input type="number" id="gpl-rating" min="0" max="31" value="10"/>' +
    '<div style="font-size:11px;color:var(--muted);margin-top:3px">0 = beginner | 31 = top player</div></div></div>' +
    '<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
    '<button class="btn btn-primary" onclick="saveGlobalPlayer()">Add player</button></div>');
  setTimeout(() => $('gpl-name') && $('gpl-name').focus(), 50);
}

function saveGlobalPlayer() {
  const name = $('gpl-name').value.trim();
  const rating = parseInt($('gpl-rating').value);
  if (!name) { alert('Enter a name'); return; }
  if (isNaN(rating) || rating < 0 || rating > 31) { alert('Rating must be 0-31'); return; }
  if (playerNameExists(name)) { alert('"' + name + '" is already in the player database. Each player must have a unique name.'); return; }
  S.players.push({ id: Date.now().toString(), name, rating, ratingHistory: [] });
  toast('Player added'); closeModal(); save(); pageAllPlayers();
}

function openGlobalEditRating(pid) {
  const p = S.players.find(p => p.id === pid);
  showModal('<div class="modal-title">Edit rating - ' + p.name + '</div>' +
    '<div class="form-row"><div><label>New rating (0 - 31)</label><input type="number" id="gpl-rating" min="0" max="31" value="' + p.rating + '"/></div></div>' +
    '<div class="form-row"><div><label>Reason (optional)</label><input id="gpl-note" placeholder="e.g. Reassessed after trials"/></div></div>' +
    '<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:4px">Logged in the player\'s rating history.</div>' +
    '<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
    '<button class="btn btn-primary" onclick="saveGlobalRatingEdit(\'' + pid + '\')">Save</button></div>');
}

function saveGlobalRatingEdit(pid) {
  const newRating = parseInt($('gpl-rating').value);
  const note = $('gpl-note')?.value.trim() || '';
  if (isNaN(newRating) || newRating < 0 || newRating > 31) { alert('Rating must be 0-31'); return; }
  const p = S.players.find(p => p.id === pid);
  const change = newRating - p.rating;
  p.rating = newRating;
  if (!p.ratingHistory) p.ratingHistory = [];
  p.ratingHistory.push({
    date: new Date().toISOString().slice(0, 10),
    roundId: null, roundName: 'Manual edit',
    opponentId: null, opponentName: null,
    result: null, change, newRating,
    note: note || 'Manual rating adjustment',
    isManual: true
  });
  toast('Rating updated'); closeModal(); save(); pageAllPlayers();
}

function openGlobalPlayerDetail(pid) {
  // Reuse the existing player detail view but navigate back to allplayers
  const p = S.players.find(p => p.id === pid);
  if (!p) return;
  const hist = [...(p.ratingHistory || [])].reverse();
  const allHist = [...(p.ratingHistory || [])];
  const sparkPoints = [];
  if (allHist.length > 0) {
    let cur = p.rating;
    const pts = [cur];
    for (let i = allHist.length - 1; i >= 0; i--) { cur = cur - allHist[i].change; pts.unshift(cur); }
    sparkPoints.push(...pts);
  }
  const min = sparkPoints.length > 0 ? Math.max(0, Math.min(...sparkPoints) - 1) : 0;
  const max = sparkPoints.length > 0 ? Math.min(31, Math.max(...sparkPoints) + 1) : 10;
  const range = max - min || 1;
  const W = 400, H = 80;
  const svgPoints = sparkPoints.map((v, i) => {
    const x = sparkPoints.length === 1 ? W/2 : (i / (sparkPoints.length - 1)) * W;
    const y = H - ((v - min) / range) * H;
    return x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');

  const playerSeasons = S.seasons.filter(s => (s.players || []).includes(pid));

  $('main-content').innerHTML =
    '<div class="round-detail-header">' +
      '<button class="back-btn" onclick="pageAllPlayers()">&#8592; Player database</button>' +
      '<div style="flex:1"><div class="page-title">' + p.name + '</div>' +
      '<div class="page-sub">Rating history</div></div>' +
      '<button class="btn btn-secondary" onclick="openGlobalEditRating(\'' + pid + '\')">Edit rating</button>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px">' +
      '<div class="stat-card"><div class="stat-val stat-accent">' + p.rating + '</div><div class="stat-label">Current rating</div></div>' +
      '<div class="stat-card"><div class="stat-val">' + (p.ratingHistory||[]).filter(h=>h.change>0).length + '</div><div class="stat-label">Rating increases</div></div>' +
      '<div class="stat-card"><div class="stat-val">' + (p.ratingHistory||[]).filter(h=>h.change<0).length + '</div><div class="stat-label">Rating decreases</div></div>' +
    '</div>' +
    (playerSeasons.length > 0 ? '<div class="card" style="margin-bottom:14px"><div class="card-title">Seasons</div><div style="display:flex;flex-wrap:wrap;gap:6px">' + playerSeasons.map(s => '<span class="badge b-navy">' + s.name + '</span>').join('') + '</div></div>' : '') +
    (sparkPoints.length > 1 ? '<div class="card" style="margin-bottom:14px"><div class="card-title">Rating over time</div><div class="sparkline-wrap">' +
      '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:80px;overflow:visible">' +
      '<polyline points="' + svgPoints + '" fill="none" stroke="var(--orange)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
      sparkPoints.map((v, i) => {
        const x = sparkPoints.length === 1 ? W/2 : (i / (sparkPoints.length - 1)) * W;
        const y = H - ((v - min) / range) * H;
        return '<circle cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" r="3" fill="var(--orange)"/>' +
               '<text x="' + x.toFixed(1) + '" y="' + (y - 7).toFixed(1) + '" text-anchor="middle" font-size="9" fill="var(--muted)">' + v + '</text>';
      }).join('') +
      '</svg></div></div>' : '') +
    '<div class="card"><div class="card-title">Change log</div>' +
    (hist.length === 0
      ? '<div style="color:var(--muted);font-size:13px;padding:8px 0">No rating changes yet.</div>'
      : hist.map(h =>
          '<div class="history-row">' +
            '<span class="rating-change ' + (h.change > 0 ? 'rc-up' : h.change < 0 ? 'rc-down' : h.isManual ? 'rc-manual' : 'rc-zero') + '">' + (h.change > 0 ? '+' : '') + h.change + '</span>' +
            '<div style="flex:1;min-width:0"><div style="font-weight:500;font-size:13px">' + (h.isManual ? (h.note || 'Manual edit') : h.roundName + (h.opponentName ? ' vs ' + h.opponentName : '')) + '</div>' +
            '<div style="font-size:11px;color:var(--muted)">' + fmtDate(h.date) + (h.result ? ' &bull; ' + (h.result === 'W' ? '<span style="color:var(--success);font-weight:600">Won</span>' : '<span style="color:var(--red);font-weight:600">Lost</span>') : '') + (h.isManual ? ' &bull; <span style="color:var(--navy);font-size:10px;font-weight:600">MANUAL</span>' : '') + '</div></div>' +
            '<div style="text-align:right;flex-shrink:0"><div style="font-size:12px;color:var(--muted)">Rating after</div><div style="font-weight:700;font-size:14px">' + h.newRating + '</div></div>' +
          '</div>').join('')) +
    '</div>';
}

function deleteGlobalPlayer(pid) {
  const p = S.players.find(p => p.id === pid);
  const inSeasons = S.seasons.filter(s => (s.players||[]).includes(pid));
  const msg = inSeasons.length > 0
    ? 'Delete ' + p.name + '? They are in ' + inSeasons.length + ' season(s). This will remove them from all seasons and their match history will remain but show as unknown player.'
    : 'Delete ' + p.name + '? This cannot be undone.';
  if (!confirm(msg)) return;
  S.players = S.players.filter(p => p.id !== pid);
  S.seasons.forEach(s => { s.players = (s.players||[]).filter(id => id !== pid); });
  toast('Player deleted'); save(); pageAllPlayers();
}

              '<div style="font-size:12px;color:var(--muted)">' + fmtDate(s.startDate) + (s.endDate ? ' - ' + fmtDate(s.endDate) : '') + ' &bull; ' + rounds.length + ' rounds (' + completed + ' complete) &bull; ' + (s.players||[]).length + ' players</div></div>' +
              '<button class="btn btn-sm btn-secondary" onclick="archiveSeason(\'' + s.id + '\')">Archive</button>' +
            '</div>';
          }).join('')) +
    '</div>' +
    '<div class="card">' +
      '<div class="card-title">Archived seasons</div>' +
      (archived.length === 0
        ? '<div style="color:var(--muted);font-size:13px">No archived seasons yet. Archive a season when it\'s complete to keep things tidy.</div>'
        : archived.map(s => {
            const rounds = seasonRounds(s.id);
            const standings = getStandings(s.id);
            const winner = standings[0]?.player?.name || '-';
            return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">' +
              '<div>' +
                '<div style="display:flex;align-items:center;gap:8px">' +
                  '<div style="font-weight:600;font-size:14px">' + s.name + '</div>' +
                  '<span class="badge b-gray">Archived</span>' +
                '</div>' +
                '<div style="font-size:12px;color:var(--muted)">' + fmtDate(s.startDate) + (s.endDate ? ' - ' + fmtDate(s.endDate) : '') + ' &bull; ' + rounds.length + ' rounds &bull; ' + (s.players||[]).length + ' players &bull; Winner: ' + winner + '</div>' +
              '</div>' +
              '<div style="display:flex;gap:6px">' +
                '<button class="btn btn-sm btn-secondary" onclick="unarchiveSeason(\'' + s.id + '\')">Restore</button>' +
                '<button class="btn btn-sm btn-danger" onclick="deleteArchivedSeason(\'' + s.id + '\')">Delete</button>' +
              '</div>' +
            '</div>';
          }).join('')) +
    '</div>';
}

function archiveSeason(sid) {
  const s = S.seasons.find(s => s.id === sid);
  if (!confirm('Archive ' + s.name + '? It will be moved to the archive and removed from the active season list.')) return;
  s.archived = true;
  if (S.activeSeason === sid) {
    const next = S.seasons.find(s => !s.archived && s.id !== sid);
    S.activeSeason = next ? next.id : null;
  }
  toast(s.name + ' archived'); save(); buildSeasonDropdown(); pageArchive();
}

function unarchiveSeason(sid) {
  const s = S.seasons.find(s => s.id === sid);
  s.archived = false;
  toast(s.name + ' restored'); save(); buildSeasonDropdown(); pageArchive();
}

function deleteArchivedSeason(sid) {
  const s = S.seasons.find(s => s.id === sid);
  if (!confirm('Permanently delete ' + s.name + ' and all its data? This cannot be undone.')) return;
  const rids = S.rounds.filter(r => r.seasonId === sid).map(r => r.id);
  S.seasons = S.seasons.filter(s => s.id !== sid);
  S.rounds = S.rounds.filter(r => r.seasonId !== sid);
  S.matches = S.matches.filter(m => !rids.includes(m.roundId));
  toast('Season deleted'); save(); buildSeasonDropdown(); pageArchive();
}

function connectGist() {
  const gistId = $('dt-gist-id')?.value.trim();
  const token = $('dt-token')?.value.trim();
  if (!gistId || !token) { alert('Enter both the Gist ID and the token'); return; }
  setGistConfig(gistId, token);
  toast('Connecting to GitHub...');
  pullFromGist().then(ok => {
    if (ok) { render(); toast('Connected! Data loaded from GitHub.'); pageDataTools(); }
    else { clearGistConfig(); alert('Could not connect. Double-check your Gist ID and token.'); pageDataTools(); }
  });
}

function disconnectGist() {
  if (!confirm('Disconnect from GitHub? Your local data will not be affected.')) return;
  clearGistConfig();
  localStorage.removeItem('tts-gist-last-push');
  localStorage.removeItem('tts-gist-last-pull');
  toast('Disconnected from GitHub');
  pageDataTools();
}

async function syncToGist() {
  const btn = event?.target; if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
  const ok = await pushToGist(false);
  if (btn) { btn.disabled = false; btn.innerHTML = '<svg style="width:14px;height:14px" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1v10M4 7l4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 13h12" stroke-linecap="round"/></svg> Save to GitHub'; }
  ok ? toast('Saved to GitHub ✓') : toast('Save failed - check your connection');
  pageDataTools();
}

async function syncFromGist() {
  if (!confirm('Load latest data from GitHub? This will replace your local copy.')) return;
  toast('Loading from GitHub...');
  const ok = await pullFromGist();
  if (ok) { render(); toast('Loaded from GitHub ✓'); pageDataTools(); }
  else toast('Load failed - check your connection');
}

function exportData() {
  const data = {
    exportDate: new Date().toISOString(),
    version: '1.0',
    seasons: S.seasons,
    players: S.players,
    rounds: S.rounds,
    matches: S.matches
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'TTS_Backup_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup downloaded');
}

function previewImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.seasons || !data.players) throw new Error('Invalid file');
      const preview = $('import-preview');
      preview.innerHTML =
        '<div style="background:var(--sbg);border:1px solid #b8dfc8;border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:13px">' +
          '<strong>File looks good.</strong> Contains: ' + data.seasons.length + ' season(s), ' + data.players.length + ' player(s), ' + data.rounds.length + ' round(s), ' + data.matches.length + ' match(es).' +
          (data.exportDate ? '<div style="font-size:11px;color:var(--muted);margin-top:4px">Exported: ' + new Date(data.exportDate).toLocaleDateString('en-AU', {day:'numeric',month:'long',year:'numeric'}) + '</div>' : '') +
        '</div>' +
        '<button class="btn btn-danger" onclick="confirmImport()">Replace all data with this backup</button>';
      window._pendingImport = data;
    } catch(err) {
      $('import-preview').innerHTML = '<div style="background:#ffecec;border:1px solid #ffb3b3;border-radius:8px;padding:12px 14px;font-size:13px;color:#b00">Invalid file. Please select a TTS backup JSON file.</div>';
    }
  };
  reader.readAsText(file);
}

function confirmImport() {
  if (!window._pendingImport) { alert('No file loaded'); return; }
  if (!confirm('This will replace ALL current data with the backup. Are you sure?')) return;
  try {
    const data = window._pendingImport;
    S.seasons = data.seasons || [];
    S.players = data.players || [];
    S.rounds = data.rounds || [];
    S.matches = data.matches || [];
    S.activeSeason = S.seasons.find(s => !s.archived)?.id || null;
    S.activeRound = null;
    S.activePage = 'dashboard';
    window._pendingImport = null;
    save(); buildSeasonDropdown(); render();
    toast('Data imported successfully');
  } catch(err) {
    alert('Import failed: ' + err.message);
  }
}

function openRoundEditor(rid) {
  const r = S.rounds.find(r => r.id === rid);
  const s = activeSeason();
  if (!r || !s) return;

  renderRoundEditorPage(rid);
}

function renderRoundEditorPage(rid) {
  const r = S.rounds.find(r => r.id === rid);
  const s = activeSeason();
  const fmt = r.bestOf === 1 ? 'Single set' : 'Best of ' + r.bestOf;

  $('main-content').innerHTML =
    '<div class="round-detail-header">' +
      '<button class="back-btn" onclick="openRoundDetail(\'' + rid + '\')">&#8592; Back to round</button>' +
      '<div style="flex:1"><div class="page-title">Edit ' + r.name + '</div>' +
      '<div class="page-sub">' + fmtDate(r.date) + ' &bull; ' + fmt + '</div></div>' +
    '</div>' +

    // ── Section 1: Basic details ──
    '<div class="card" style="margin-bottom:14px">' +
      '<div class="card-title">Round details</div>' +
      '<div class="form-row c2">' +
        '<div><label>Round name</label><input id="re-name" value="' + r.name + '"/></div>' +
        '<div><label>Date</label><input type="date" id="re-date" value="' + (r.date || '') + '"/></div>' +
      '</div>' +
      '<div class="form-row c2">' +
        '<div><label>Format</label><select id="re-bo">' +
          '<option value="1"' + (r.bestOf === 1 ? ' selected' : '') + '>Single set</option>' +
          '<option value="3"' + (r.bestOf === 3 ? ' selected' : '') + '>Best of 3</option>' +
          '<option value="5"' + (r.bestOf === 5 ? ' selected' : '') + '>Best of 5</option>' +
        '</select></div>' +
        '<div></div>' +
      '</div>' +
      '<button class="btn btn-primary" onclick="saveRoundDetails(\'' + rid + '\')">Save details</button>' +
    '</div>' +

    // ── Section 2: Groups ──
    '<div class="card" style="margin-bottom:14px">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
        '<div class="card-title" style="margin-bottom:0">Groups</div>' +
        '<button class="btn btn-sm btn-primary" onclick="addGroupToRound(\'' + rid + '\')">+ Add group</button>' +
      '</div>' +
      renderEditorGroups(r, s) +
    '</div>';
}

function renderEditorGroups(r, s) {
  if (!r.groups || r.groups.length === 0) {
    return '<div style="color:var(--muted);font-size:13px">No groups yet.</div>';
  }

  const allInRound = r.groups.flatMap(g => g.playerIds);

  return r.groups.map((g, gi) => {
    const players = g.playerIds.map(pid => S.players.find(p => p.id === pid)).filter(Boolean);
    const colours = ['#212326','#01366C','#DC3512','#FF751F','#1a5c2a','#5c2a1a'];
    const colour = colours[gi] || '#212326';

    // Work out which players can be moved (no scored matches in this group)
    const otherGroups = r.groups.filter(og => og.id !== g.id);
    const otherGroupIds = otherGroups.map(og => og.id);

    let playerRows = '';
    players.sort((a,b) => b.rating - a.rating).forEach(p => {
      const hasScores = S.matches.some(m =>
        m.roundId === r.id && m.groupId === g.id && !m.isHeadToHead &&
        (m.p1Id === p.id || m.p2Id === p.id) && m.winnerId
      );
      const canMove = !hasScores && otherGroups.length > 0;
      const moveOptions = otherGroups.map(og =>
        '<option value="' + og.id + '">' + og.name + '</option>'
      ).join('');

      playerRows +=
        '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">' +
          '<span style="flex:1;font-weight:500;font-size:13px">' + p.name + '</span>' +
          '<span class="badge b-orange">' + p.rating + '</span>' +
          (canMove
            ? '<select onchange="movePlayer(\'' + r.id + '\',\'' + g.id + '\',\'' + p.id + '\',this.value)" style="font-size:12px;padding:4px 6px;width:auto">' +
                '<option value="">Move to...</option>' + moveOptions +
              '</select>'
            : (hasScores
                ? '<span style="font-size:11px;color:var(--muted);font-style:italic">Has scores</span>'
                : '')) +
          '<button class="btn btn-sm btn-danger" onclick="removePlayerFromGroupEditor(\'' + r.id + '\',\'' + g.id + '\',\'' + p.id + '\')">Remove</button>' +
        '</div>';
    });

    // Available players to add (season players not in any group)
    const available = (s ? seasonPlayers(s.id) : []).filter(p => !allInRound.includes(p.id));
    const addOptions = available.length > 0
      ? '<div style="margin-top:10px;display:flex;gap:8px;align-items:center">' +
          '<select id="re-add-' + g.id + '" style="flex:1;font-size:12px">' +
            '<option value="">Add player...</option>' +
            available.sort((a,b) => b.rating - a.rating).map(p =>
              '<option value="' + p.id + '">' + p.name + ' (' + p.rating + ')</option>'
            ).join('') +
          '</select>' +
          '<button class="btn btn-sm btn-primary" onclick="addPlayerToGroupEditor(\'' + r.id + '\',\'' + g.id + '\')">Add</button>' +
          '<button class="btn btn-sm btn-secondary" onclick="addNewPlayerInEditor(\'' + r.id + '\',\'' + g.id + '\',\'' + (s ? s.id : '') + '\')">+ New player</button>' +
        '</div>'
      : '<div style="margin-top:10px;font-size:12px;color:var(--muted);font-style:italic">All season players already assigned.</div>';

    return '<div class="group-card" style="margin-bottom:12px">' +
      '<div class="group-header" style="background:' + colour + ';display:flex;justify-content:space-between;align-items:center">' +
        '<span class="group-header-name">' + g.name + '</span>' +
        '<button class="btn btn-sm btn-danger" onclick="removeGroupFromRound(\'' + r.id + '\',\'' + g.id + '\')" style="background:rgba(255,255,255,0.15);border:none;color:#fff">Remove group</button>' +
      '</div>' +
      '<div class="group-body">' +
        (players.length === 0
          ? '<div style="color:var(--muted);font-size:13px;margin-bottom:8px">No players in this group.</div>'
          : playerRows) +
        addOptions +
      '</div>' +
    '</div>';
  }).join('');
}

function saveRoundDetails(rid) {
  const r = S.rounds.find(r => r.id === rid);
  const name = $('re-name').value.trim();
  if (!name) { alert('Enter a round name'); return; }
  r.name = name;
  r.date = $('re-date').value;
  r.bestOf = parseInt($('re-bo').value);
  // Note: existing scores are kept as-is when format changes
  toast('Round details saved'); save(); renderRoundEditorPage(rid);
}

function addGroupToRound(rid) {
  const r = S.rounds.find(r => r.id === rid);
  const i = r.groups.length;
  const ts = Date.now();
  r.groups.push({
    id: (ts + i).toString(),
    name: 'Group ' + String.fromCharCode(65 + i),
    playerIds: []
  });
  toast('Group added'); save(); renderRoundEditorPage(rid);
}

function removeGroupFromRound(rid, gid) {
  const r = S.rounds.find(r => r.id === rid);
  const g = r.groups.find(g => g.id === gid);
  const hasMatches = S.matches.some(m => m.roundId === rid && m.groupId === gid);
  const msg = hasMatches
    ? 'Removing ' + g.name + ' will delete all match results entered for it. This cannot be undone. Continue?'
    : 'Remove ' + g.name + '?';
  if (!confirm(msg)) return;
  S.matches = S.matches.filter(m => !(m.roundId === rid && m.groupId === gid));
  r.groups = r.groups.filter(g => g.id !== gid);
  toast('Group removed'); save(); renderRoundEditorPage(rid);
}

function addPlayerToGroupEditor(rid, gid) {
  const r = S.rounds.find(r => r.id === rid);
  const g = r.groups.find(g => g.id === gid);
  const pid = $('re-add-' + gid)?.value;
  if (!pid) { alert('Select a player'); return; }
  if (!g.playerIds.includes(pid)) g.playerIds.push(pid);
  toast('Player added'); save(); renderRoundEditorPage(rid);
}

function addNewPlayerInEditor(rid, gid, sid) {
  showModal('<div class="modal-title">New player</div>' +
    '<div style="font-size:13px;color:var(--muted);margin-bottom:14px">Adds to database, season, and this group.</div>' +
    '<div class="form-row"><div><label>Full name</label><input id="enp-name" placeholder="Player name"/></div></div>' +
    '<div class="form-row"><div><label>Rating (0 - 31)</label><input type="number" id="enp-rating" min="0" max="31" value="10"/></div></div>' +
    '<div class="modal-actions">' +
      '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
      '<button class="btn btn-primary" onclick="saveNewPlayerInEditor(\'' + rid + '\',\'' + gid + '\',\'' + sid + '\')">Add player</button>' +
    '</div>');
  setTimeout(() => $('enp-name') && $('enp-name').focus(), 50);
}

function saveNewPlayerInEditor(rid, gid, sid) {
  const name = $('enp-name').value.trim();
  const rating = parseInt($('enp-rating').value);
  if (!name) { alert('Enter a name'); return; }
  if (isNaN(rating) || rating < 0 || rating > 31) { alert('Rating must be 0-31'); return; }
  if (playerNameExists(name)) { alert('"' + name + '" is already in the player database. Each player must have a unique name.'); return; }
  const p = { id: Date.now().toString(), name, rating, ratingHistory: [] };
  S.players.push(p);
  const season = S.seasons.find(s => s.id === sid);
  if (season) { if (!season.players) season.players = []; season.players.push(p.id); }
  const r = S.rounds.find(r => r.id === rid);
  const g = r.groups.find(g => g.id === gid);
  g.playerIds.push(p.id);
  toast(name + ' added'); closeModal(); save(); buildSeasonDropdown(); renderRoundEditorPage(rid);
}

function removePlayerFromGroupEditor(rid, gid, pid) {
  const r = S.rounds.find(r => r.id === rid);
  const g = r.groups.find(g => g.id === gid);
  const hasScores = S.matches.some(m =>
    m.roundId === rid && m.groupId === gid && !m.isHeadToHead &&
    (m.p1Id === pid || m.p2Id === pid) && m.winnerId
  );
  if (hasScores) {
    if (!confirm('This player has match scores in this group. Removing them will delete those matches. Continue?')) return;
    S.matches = S.matches.filter(m =>
      !(m.roundId === rid && m.groupId === gid && !m.isHeadToHead &&
        (m.p1Id === pid || m.p2Id === pid))
    );
  }
  g.playerIds = g.playerIds.filter(id => id !== pid);
  toast('Player removed'); save(); renderRoundEditorPage(rid);
}

function movePlayer(rid, fromGid, pid, toGid) {
  if (!toGid) return;
  const r = S.rounds.find(r => r.id === rid);
  const fromG = r.groups.find(g => g.id === fromGid);
  const toG = r.groups.find(g => g.id === toGid);
  if (!fromG || !toG) return;
  // Only allowed if no scored matches (checked in UI, double-check here)
  const hasScores = S.matches.some(m =>
    m.roundId === rid && m.groupId === fromGid && !m.isHeadToHead &&
    (m.p1Id === pid || m.p2Id === pid) && m.winnerId
  );
  if (hasScores) { alert('Cannot move a player who has scored matches in this group.'); renderRoundEditorPage(rid); return; }
  fromG.playerIds = fromG.playerIds.filter(id => id !== pid);
  if (!toG.playerIds.includes(pid)) toG.playerIds.push(pid);
  toast('Player moved to ' + toG.name); save(); renderRoundEditorPage(rid);
}

// INIT
async function init() {
  load(); // load localStorage first so UI is instant
  render();
  if (hasGistConfig()) {
    // Show a subtle syncing indicator
    const indicator = document.createElement('div');
    indicator.id = 'sync-indicator';
    indicator.style.cssText = 'position:fixed;top:12px;right:16px;background:var(--navy);color:#fff;font-size:11px;padding:4px 10px;border-radius:6px;z-index:400;font-family:Poppins,sans-serif;opacity:0.9';
    indicator.textContent = 'Syncing with GitHub...';
    document.body.appendChild(indicator);
    const ok = await pullFromGist();
    indicator.remove();
    if (ok) {
      render();
      toast('Loaded latest data from GitHub');
    } else {
      toast('Could not reach GitHub - using local data');
    }
  }
}
init();

// ── Dark mode ──
const SWOOSH_LIGHT = "data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27800%27 height=%27200%27 viewBox=%270 0 800 200%27%3E%3Cpath d=%27M0,150 Q200,50 400,100 T800,50%27 stroke=%27%23ccc%27 stroke-width=%273%27 fill=%27none%27/%3E%3C/svg%3E";
const SWOOSH_DARK  = "data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27800%27 height=%27200%27 viewBox=%270 0 800 200%27%3E%3Cpath d=%27M0,150 Q200,50 400,100 T800,50%27 stroke=%27%23ccc%27 stroke-width=%273%27 fill=%27none%27/%3E%3C/svg%3E";

function updateSwooshImages(isDark) {
  document.querySelectorAll('img.swoosh-img').forEach(img => {
    img.src = isDark ? SWOOSH_DARK : SWOOSH_LIGHT;
  });
}

function toggleDarkMode() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  localStorage.setItem('tts-dark', isDark ? '1' : '0');
  updateDarkIcon(isDark);
  updateSwooshImages(isDark);
}
function updateDarkIcon(isDark) {
  const btn = $('dark-mode-btn'); if (!btn) return;
  btn.innerHTML = isDark
    ? `<svg id="dark-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1v1M8 14v1M1 8h1M14 8h1M3.5 3.5l.7.7M11.8 11.8l.7.7M11.8 4.2l-.7.7M4.2 11.8l-.7.7" stroke-linecap="round"/></svg>`
    : `<svg id="dark-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 9.5A5.5 5.5 0 016 3a6 6 0 100 10 5.5 5.5 0 007-3.5z" stroke-linecap="round"/></svg>`;
}

// Apply saved dark mode on load
(function() {
  if (localStorage.getItem('tts-dark') === '1') {
    document.body.classList.add('dark');
    setTimeout(() => { updateDarkIcon(true); updateSwooshImages(true); }, 0);
  }
})();
